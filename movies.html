<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NEEK Movies</title>

<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

:root{
--accent:#D4AF37;
--topbar-bg:#D4AF37;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:black;
color:white;
min-height:100vh;
padding:40px;
opacity:0;
animation:fadeIn .4s ease forwards;
}

@keyframes fadeIn{
to{opacity:1}
}

/* TOPBAR (same behavior as index.html) */

.topbar{
position:absolute;
top:-6px;
left:50%;
transform:translateX(-50%);
width:70%;
height:55px;
background:var(--topbar-bg);
border-radius:0 0 30px 30px;
display:flex;
align-items:center;
justify-content:center;
}

.topbar ul{
display:flex;
gap:28px;
list-style:none;
align-items:center;
}

.topbar a{
text-decoration:none;
color:black;
font-weight:500;
display:flex;
align-items:center;
gap:6px;
cursor:pointer;
}

.topbar i{
font-size:14px;
}

.nav-text{
display:inline;
}

/* HEADER */

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-top:50px;
margin-bottom:30px;
}

.logo{
font-family:'Oswald';
font-size:28px;
}

.header-right{
display:flex;
gap:10px;
}

.back{
border:1px solid white;
padding:6px 14px;
border-radius:30px;
background:black;
color:white;
text-decoration:none;
}

.join{
border:1px solid white;
padding:6px 14px;
border-radius:30px;
background:white;
color:black;
text-decoration:none;
}

/* ROWS */

.row{
margin-bottom:40px;
}

.row-title{
font-family:'Oswald';
font-size:28px;
margin-bottom:14px;
color:var(--accent);
}

/* MOVIE SCROLLER */

.movies{
display:flex;
gap:14px;
overflow-x:auto;
padding-bottom:10px;
}

.movies::-webkit-scrollbar{
display:none;
}

/* POSTERS */

.poster{
flex:0 0 auto;
width:150px;
cursor:pointer;
}

.poster img{
width:100%;
aspect-ratio:2/3;
object-fit:cover;
border-radius:10px;
transition:transform .25s ease;
}

.poster img:hover{
transform:scale(1.07);
}

/* SEARCH OVERLAY */

.search-overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.95);
display:flex;
align-items:center;
justify-content:center;
opacity:0;
pointer-events:none;
transition:.3s;
}

.search-overlay.active{
opacity:1;
pointer-events:auto;
}

.search-box{
width:90%;
max-width:600px;
}

.search-box input{
width:100%;
padding:18px;
border-radius:30px;
border:none;
font-size:18px;
}

/* MOBILE */

@media(max-width:720px){

body{
padding:20px;
}

.topbar{
position:relative;
top:0;
width:100%;
border-radius:30px;
margin-bottom:20px;
}

.nav-text{
display:none;
}

.topbar ul{
gap:20px;
}

.poster{
width:120px;
}

.header{
margin-top:0;
}

}

</style>
</head>

<body>

<!-- TOPBAR -->

<div class="topbar">
<ul>

<li>
<a href="index.html">
<i class="fa-solid fa-globe"></i>
<span class="nav-text">Universes</span>
</a>
</li>

<li>
<a href="movies.html">
<i class="fa-solid fa-film"></i>
<span class="nav-text">Movies/Series</span>
</a>
</li>

<li>
<a>
<i class="fa-solid fa-fire"></i>
<span class="nav-text">Trending</span>
</a>
</li>

<li>
<a>
<i class="fa-solid fa-star"></i>
<span class="nav-text">New</span>
</a>
</li>

<li>
<a>
<i class="fa-solid fa-trophy"></i>
<span class="nav-text">Top Rated</span>
</a>
</li>

<li>
<a onclick="openSearch()">
<i class="fa-solid fa-magnifying-glass"></i>
</a>
</li>

</ul>
</div>

<!-- HEADER -->

<div class="header">

<div class="logo">NEEK° MOVIES</div>

<div class="header-right">
<a class="back" href="index.html">Back</a>
<a class="join" href="auth/login.html">Join</a>
</div>

</div>

<div id="content"></div>

<!-- SEARCH -->

<div class="search-overlay" id="searchOverlay">

<div class="search-box">
<input placeholder="Search movies or series..." onkeydown="goSearch(event,this)">
</div>

</div>

<script>

const API="https://api.themoviedb.org/3"
const KEY="e3afd4c89e3351edad9e875ff7a01f0c"
const IMG="https://image.tmdb.org/t/p/w500"

const rows=[
{title:"Trending This Week",url:"/trending/movie/week",type:"movie"},
{title:"Popular Movies",url:"/movie/popular",type:"movie"},
{title:"Top Rated Movies",url:"/movie/top_rated",type:"movie"},
{title:"Now Playing",url:"/movie/now_playing",type:"movie"},
{title:"Popular TV Series",url:"/tv/popular",type:"series"}
]

async function loadRow(row){

const res=await fetch(API+row.url+"?api_key="+KEY)
const data=await res.json()

const section=document.createElement("div")
section.className="row"

section.innerHTML=`
<div class="row-title">${row.title}</div>
<div class="movies"></div>
`

const container=section.querySelector(".movies")

data.results.slice(0,15).forEach(item=>{

const poster=item.poster_path?IMG+item.poster_path:""

const el=document.createElement("div")
el.className="poster"

el.innerHTML=`<img src="${poster}">`

el.onclick=()=>{
window.location="m-info.html?id="+item.id+"&type="+row.type
}

container.appendChild(el)

})

document.getElementById("content").appendChild(section)

}

async function init(){
for(const r of rows){
await loadRow(r)
}
}

init()

function openSearch(){
document.getElementById("searchOverlay").classList.add("active")
}

function goSearch(e,input){
if(e.key==="Enter"){
window.location="m-search.html?q="+encodeURIComponent(input.value)
}
}

document.getElementById("searchOverlay").onclick=(e)=>{
if(e.target.id==="searchOverlay"){
e.target.classList.remove("active")
}
}

</script>

</body>
</html>
