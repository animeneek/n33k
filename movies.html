<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Movies • NEEK</title>

<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">

<style>

:root{
--accent:#D4AF37;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:black;
color:white;
min-height:100vh;
padding:30px;
opacity:0;
animation:fadeIn .4s ease forwards;
}

@keyframes fadeIn{
to{opacity:1}
}

/* HEADER */

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
}

.logo{
font-family:'Oswald';
font-size:26px;
}

.join{
background:white;
color:black;
padding:6px 16px;
border-radius:30px;
text-decoration:none;
}

/* TOP NAV */

.nav{
display:flex;
gap:25px;
margin-bottom:30px;
font-size:14px;
flex-wrap:wrap;
}

.nav a{
text-decoration:none;
color:#aaa;
}

.nav a:hover{
color:var(--accent);
}

/* ROW */

.row{
margin-bottom:40px;
}

.row-title{
font-family:'Oswald';
font-size:26px;
margin-bottom:15px;
color:var(--accent);
}

/* MOVIE SCROLLER */

.movies{
display:flex;
gap:14px;
overflow-x:auto;
padding-bottom:10px;
}

.movies::-webkit-scrollbar{
display:none;
}

/* POSTER */

.poster{
flex:0 0 auto;
width:150px;
cursor:pointer;
}

.poster img{
width:100%;
aspect-ratio:2/3;
object-fit:cover;
border-radius:10px;
transition:transform .25s ease;
}

.poster img:hover{
transform:scale(1.06);
}

/* MOBILE */

@media(max-width:700px){

.poster{
width:120px;
}

}

</style>
</head>

<body>

<div class="header">

<div class="logo">NEEK° MOVIES</div>

<a class="join" href="auth/login.html">Join</a>

</div>

<div class="nav">

<a href="index.html">Home</a>
<a href="movies.html">Movies</a>
<a href="#">Trending</a>
<a href="#">Popular</a>
<a href="#">Top Rated</a>
<a href="#">TV Series</a>

</div>

<div id="content"></div>

<script>

const API="https://api.themoviedb.org/3"
const KEY="e3afd4c89e3351edad9e875ff7a01f0c"
const IMG="https://image.tmdb.org/t/p/w500"

const rows=[
{title:"Trending This Week",url:"/trending/movie/week",type:"movie"},
{title:"Popular Movies",url:"/movie/popular",type:"movie"},
{title:"Top Rated Movies",url:"/movie/top_rated",type:"movie"},
{title:"Now Playing",url:"/movie/now_playing",type:"movie"},
{title:"Popular TV Series",url:"/tv/popular",type:"series"}
]

async function loadRow(row){

const res=await fetch(API+row.url+"?api_key="+KEY)
const data=await res.json()

const section=document.createElement("div")
section.className="row"

section.innerHTML=`
<div class="row-title">${row.title}</div>
<div class="movies"></div>
`

const container=section.querySelector(".movies")

data.results.slice(0,15).forEach(item=>{

const poster=item.poster_path?IMG+item.poster_path:""

const el=document.createElement("div")
el.className="poster"

el.innerHTML=`<img src="${poster}">`

el.onclick=()=>{
window.location="m-info.html?id="+item.id+"&type="+row.type
}

container.appendChild(el)

})

document.getElementById("content").appendChild(section)

}

async function init(){

for(const r of rows){
await loadRow(r)
}

}

init()

</script>

</body>
</html>
