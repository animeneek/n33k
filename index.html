<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEEK</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">

<style>
:root{
  --wrapper-bg:#000000;
  --topbar-bg:#FF4444;
  --accent:#FF4444;
}

*{margin:0;padding:0;box-sizing:border-box;transition:.3s ease;}
body{
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:'Inter',sans-serif;
}

/* WRAPPER */
.wrapper{
  width:92vw;
  max-width:1500px;
  height:95vh;               /* Fits screen */
  background:var(--wrapper-bg);
  border-radius:40px;
  border:6px solid black;
  padding:40px 50px 30px;
  position:relative;
  display:flex;
  flex-direction:column;
}

/* TOP CURVED BAR */
.topbar{
  position:absolute;
  top:-6px;
  left:50%;
  transform:translateX(-50%);
  width:70%;
  height:55px;              /* Reduced height */
  background:var(--topbar-bg);
  border-radius:0 0 30px 30px;
  display:flex;
  align-items:center;
  justify-content:center;
  color:black;
  font-size:13px;
}
.topbar ul{
  display:flex;
  gap:30px;
  list-style:none;
  flex-wrap:wrap;
}

/* HEADER ROW */
.header{
  display:flex;
  justify-content:space-between;
  margin-bottom:20px;
}
.logo{
  font-family:'Oswald';
  font-size:24px;
  color:white;
}
.join{
  border:1px solid white;
  padding:6px 16px;
  border-radius:30px;
  background:white;
}

/* MAIN GRID */
.main-grid{
  display:grid;
  grid-template-columns:2fr 1fr;
  gap:40px;
  flex:1;
  align-items:center;
}

/* TITLE */
.title{
  font-family:'Oswald';
  font-size:80px;  /* Slightly reduced to fit height */
  line-height:.9;
  color:white;
}

/* IMAGE BOXES */
.hero-box{
  margin-top:20px;
  width:100%;
  height:360px;   /* Slightly reduced */
  border-radius:30px;
  overflow:hidden;
}
.hero-box img{
  width:100%;
  height:100%;
  object-fit:cover;
}  

/* ===== CUSTOM SHAPED HERO BOX ===== 

.hero-box{
  margin-top:20px;
  width:100%;
  height:360px;
  overflow:hidden;
  position:relative;

  /* Rounded corners 
  border-radius:30px;

  /* Custom slanted cuts 
  clip-path: polygon(
    0% 12%,      /* bottom-left cut start 
    12% 0%,      
    100% 0%,     
    100% 88%,    
    88% 100%,    /* top-right cut 
    0% 100%
  );
}

.hero-box img{
  width:100%;
  height:100%;
  object-fit:cover;
} */

.side-box{
  width:100%;
  height:450px;
  border-radius:30px;
  overflow:hidden;
  position:relative;
}
.side-box img{
  width:100%;
  height:100%;
  object-fit:cover;
}
.accent-strip{
  position:absolute;
  right:0;
  top:0;
  width:12px;
  height:100%;
  background:var(--accent);
}

/* ENTER BUTTON */
.enter-wrap{
  display:flex;
  justify-content:center;
  margin:25px 0;
}
.enter-btn{
  padding:14px 60px;
  border-radius:40px;
  border:2px solid white;
  background:black;
  color:white;
  font-weight:600;
  cursor:pointer;
}
.enter-btn:hover{
  background:var(--accent);
  color:black;
}

/* BOTTOM PANEL */
.bottom-panel{
  background:white;
  border-radius:25px;
  padding:20px 25px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.panel-left{
  max-width:60%;
}
.panel-title{
  font-weight:600;
  margin-bottom:5px;
}

.panel-options{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}
.panel-options button{
  padding:10px 22px;
  border-radius:30px;
  border:none;
  background:#eee;
  font-weight:500;
  cursor:pointer;
}
.panel-options button.active{
  background:var(--accent);
  color:white;
}

/* MOBILE */
@media(max-width:900px){

  .wrapper{
    height:98vh;
    padding:30px 25px;
  }

  .main-grid{
    grid-template-columns:1fr;
    gap:20px;
  }

  .side-box{
    display:none;
  }

  .title{
    font-size:60px;
  }

  .hero-box{
    height:280px;
  }

  .topbar{
    width:90%;
    font-size:12px;
  }
}
</style>
</head>

<body>

<div class="wrapper">

<div class="topbar">
  <ul>
    <li>Lore</li>
    <li>Universes</li>
    <li>Archive</li>
    <li>Contact</li>
  </ul>
</div>

<div class="header">
  <div class="logo">NEEK°</div>
  <div class="join">Join</div>
</div>

<div class="main-grid">

  <div>
    <div class="title" id="titleText">ANIME<br>NEEK</div>

    <div class="hero-box">
      <img id="mainImage" src="images/anime-main.jpg">
    </div>
  </div>

  <div class="side-box">
    <div class="accent-strip"></div>
    <img id="sideImage" src="images/anime-side.jpg">
  </div>

</div>

<div class="enter-wrap">
  <button class="enter-btn">ENTER</button>
</div>

<div class="bottom-panel">
  <div class="panel-left">
    <div class="panel-title">NEEK UNIVERSE MODE</div>
    <div>Select your dimension.</div>
  </div>

  <div class="panel-options">
    <button class="active" onclick="mode('anime',this)">Anime</button>
    <button onclick="mode('movies',this)">Movies/Series</button>
    <button onclick="mode('games',this)">Games</button>
    <button onclick="mode('secret',this)">Secret</button>
  </div>
</div>

</div>

<script>
function mode(type,el){

document.querySelectorAll('.panel-options button')
.forEach(b=>b.classList.remove('active'));
el.classList.add('active');

const root=document.documentElement;

if(type==='anime'){
root.style.setProperty('--accent','#FF4444');
root.style.setProperty('--topbar-bg','#FF4444');
titleText.innerHTML="ANIME<br>NEEK";
mainImage.src="images/anime-main.jpg";
sideImage.src="images/anime-side.jpg";
}

if(type==='movies'){
root.style.setProperty('--accent','#D4AF37'); /* GOLD */
root.style.setProperty('--topbar-bg','#D4AF37');
titleText.innerHTML="MOVIES<br>NEEK";
mainImage.src="images/movie-main.jpg";
sideImage.src="images/movie-side.jpg";
}

if(type==='games'){
root.style.setProperty('--accent','#00E5FF');
root.style.setProperty('--topbar-bg','#00E5FF');
titleText.innerHTML="GAMES<br>NEEK";
mainImage.src="images/game-main.jpg";
sideImage.src="images/game-side.jpg";
}

if(type==='secret'){
root.style.setProperty('--accent','#7A0000');
root.style.setProperty('--topbar-bg','#7A0000');
titleText.innerHTML="SECRET<br>NEEK";
mainImage.src="images/secret-main.jpg";
sideImage.src="images/secret-side.jpg";
}
}
</script>

</body>
</html>
