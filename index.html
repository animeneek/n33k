<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEEK</title>

<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">

<style>

:root{
--wrapper-bg:#000000;
--topbar-bg:#FF4444;
--accent:#FF4444;
}

/* smooth color transition */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
transition:background .25s ease,color .25s ease;
}

html,body{
height:100%;
background:black;
display:flex;
justify-content:center;
align-items:center;
}

/* WRAPPER */

.wrapper{
width:92vw;
max-width:1500px;
height:95vh;
background:var(--wrapper-bg);
border-radius:40px;
border:6px solid black;
padding:40px 50px 30px;
position:relative;
display:flex;
flex-direction:column;
}

/* TOPBAR */

.topbar{
position:absolute;
top:-6px;
left:50%;
transform:translateX(-50%);
width:70%;
height:55px;
background:var(--topbar-bg);
border-radius:0 0 30px 30px;
display:flex;
align-items:center;
justify-content:center;
font-size:13px;
}

.topbar ul{
display:flex;
gap:30px;
list-style:none;
}

.topbar a{
text-decoration:none;
color:black;
}

/* HEADER */

.header{
display:flex;
justify-content:space-between;
margin-bottom:20px;
}

.logo{
font-family:'Oswald';
font-size:24px;
color:white;
}

.join{
border:1px solid white;
padding:6px 16px;
border-radius:30px;
background:white;
cursor:pointer;
text-decoration:none;
color:black;
}

/* MAIN GRID */

.main-grid{
display:grid;
grid-template-columns:2fr 1fr;
gap:40px;
flex:1;
align-items:center;
}

/* TITLE */

.title{
font-family:'Oswald';
font-size:80px;
line-height:.9;
color:white;
opacity:1;
transition:opacity .25s ease;
}

/* HERO IMAGE */

.hero-box{
margin-top:20px;
width:100%;
height:360px;
border-radius:30px;
overflow:hidden;
}

.hero-box img{
width:100%;
height:100%;
object-fit:cover;
opacity:1;
transition:opacity .25s ease;
}

/* SIDE IMAGE */

.side-box{
width:100%;
height:450px;
border-radius:30px;
overflow:hidden;
position:relative;
}

.side-box img{
width:100%;
height:100%;
object-fit:cover;
opacity:1;
transition:opacity .25s ease;
}

.accent-strip{
position:absolute;
right:0;
top:0;
width:12px;
height:100%;
background:var(--accent);
}

/* ENTER BUTTON */

.enter-wrap{
display:flex;
justify-content:center;
margin:20px 0;
}

.enter-btn{
padding:14px 60px;
border-radius:40px;
border:2px solid white;
background:black;
color:white;
font-weight:600;
cursor:pointer;
}

.enter-btn:hover{
background:var(--accent);
color:black;
}

/* BOTTOM PANEL */

.bottom-panel{
background:white;
border-radius:25px;
padding:20px 25px;
display:flex;
justify-content:space-between;
align-items:center;
}

.panel-left{
max-width:60%;
}

.panel-title{
font-weight:600;
margin-bottom:5px;
}

.panel-options{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.panel-options button{
padding:10px 22px;
border-radius:30px;
border:none;
background:#eee;
font-weight:500;
cursor:pointer;
color:black;
}

.panel-options button.active{
background:var(--accent);
color:white;
}

/* MOBILE */

@media(max-width:900px){

html,body{
align-items:flex-start;
height:100dvh;
overflow:hidden;
}

.wrapper{
height:100dvh;
padding:20px;
}

.topbar{
position:relative;
top:0;
width:100%;
border-radius:30px;
height:auto;
padding:10px 0;
margin-bottom:10px;
}

.topbar ul{
justify-content:center;
gap:15px;
font-size:12px;
flex-wrap:wrap;
}

.main-grid{
grid-template-columns:1fr;
gap:15px;
}

.side-box{
display:none;
}

.title{
font-size:40px;
}

.hero-box{
height:190px;
margin-top:10px;
}

.enter-wrap{
margin:10px 0;
}

.enter-btn{
width:100%;
max-width:260px;
}

.bottom-panel{
flex-direction:column;
align-items:flex-start;
gap:12px;
padding:15px;
}

.panel-left{
max-width:100%;
}

.panel-options{
width:100%;
display:grid;
grid-template-columns:1fr 1fr;
gap:8px;
}

.panel-options button{
width:100%;
padding:10px 0;
font-size:13px;
}

}

</style>
</head>

<body>

<div class="wrapper">

<div class="topbar">
<ul>
<li><a href="index.html">Universes</a></li>
<li><a href="lore.html">Lore</a></li>
<li><a href="archives.html">Archive</a></li>
<li><a href="contact.html">Contact</a></li>
</ul>
</div>

<div class="header">
<div class="logo">NEEK°</div>
<a href="auth/login.html" class="join">Join</a>
</div>

<div class="main-grid">

<div>

<div class="title" id="titleText">ANIME<br>NEEK</div>

<div class="hero-box">
<img id="mainImage" src="images/anime-main.jpg">
</div>

</div>

<div class="side-box">
<div class="accent-strip"></div>
<img id="sideImage" src="images/anime-side.jpg">
</div>

</div>

<div class="enter-wrap">
<button class="enter-btn" onclick="enterUniverse()">ENTER</button>
</div>

<div class="bottom-panel">

<div class="panel-left">
<div class="panel-title">NEEK UNIVERSE MODE</div>
<div>Select your dimension.</div>
</div>

<div class="panel-options">
<button class="active" onclick="mode('anime',this)">Anime</button>
<button onclick="mode('movies',this)">Movies/Series</button>
<button onclick="mode('games',this)">Games</button>
<button onclick="mode('neek',this)">Neek</button>
</div>

</div>

</div>

<script>

let currentMode="anime"

function fadeSwap(newMain,newSide,newTitle){

const main=document.getElementById("mainImage")
const side=document.getElementById("sideImage")
const title=document.getElementById("titleText")

main.style.opacity=0
side.style.opacity=0
title.style.opacity=0

setTimeout(()=>{

main.src=newMain
side.src=newSide
title.innerHTML=newTitle

main.style.opacity=1
side.style.opacity=1
title.style.opacity=1

},180)

}

function mode(type,el){

document.querySelectorAll('.panel-options button')
.forEach(b=>b.classList.remove('active'))

el.classList.add('active')

currentMode=type

const root=document.documentElement

if(type==="anime"){
root.style.setProperty('--accent','#FF4444')
root.style.setProperty('--topbar-bg','#FF4444')
fadeSwap("images/anime-main.jpg","images/anime-side.jpg","ANIME<br>NEEK")
}

if(type==="movies"){
root.style.setProperty('--accent','#D4AF37')
root.style.setProperty('--topbar-bg','#D4AF37')
fadeSwap("images/movie-main.jpg","images/movie-side.jpg","MOVIES<br>NEEK")
}

if(type==="games"){
root.style.setProperty('--accent','#00E5FF')
root.style.setProperty('--topbar-bg','#00E5FF')
fadeSwap("images/game-main.jpg","images/game-side.jpg","GAMES<br>NEEK")
}

if(type==="neek"){
root.style.setProperty('--accent','#9CA3AF')
root.style.setProperty('--topbar-bg','#9CA3AF')
fadeSwap("images/neek-main.jpg","images/neek-side.jpg","NEEK<br>UNIVERSE")
}

}

function enterUniverse(){

if(currentMode==="anime") window.location="anime.html"
if(currentMode==="movies") window.location="movies.html"
if(currentMode==="games") window.location="games.html"
if(currentMode==="neek") window.location="neek.html"

}

</script>

</body>
</html>
