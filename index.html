<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEEK</title>

<style>

/* ================= ROOT ================= */

:root{
  --wrapper-bg:#000000;        /* ALWAYS BLACK */
  --topbar-bg:#FF4444;         /* Changes per mode */
  --accent:#FF4444;            /* Active accent */
}

/* ================= RESET ================= */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, Helvetica, sans-serif;
}

html,body{
  height:100%;
  overflow:hidden; /* NO SCROLL */
}

/* ================= WRAPPER ================= */

.wrapper{
  height:100vh;
  width:100vw;
  background:var(--wrapper-bg);
  display:flex;
  flex-direction:column;
}

/* ================= TOPBAR ================= */

.topbar{
  height:70px;
  background:var(--topbar-bg);
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  font-size:22px;
  letter-spacing:2px;
  color:#000;
}

/* ================= MAIN GRID ================= */

.main-layout{
  flex:1;
  display:grid;
  grid-template-columns: 1fr 2fr 1fr;
  align-items:center;
  padding:2vw;
}

/* ================= SIDE IMAGES ================= */

.side-images{
  display:flex;
  flex-direction:column;
  gap:20px;
  align-items:center;
}

.side-images img{
  width:180px;
  height:220px;
  object-fit:cover;
  border-radius:14px;
  transition:0.3s;
}

/* ================= CENTER COLUMN ================= */

.center-column{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:20px;
}

/* ================= MAIN BOX ================= */

.mode-main{
  width:420px;
  height:520px;
  background:#111;
  border-radius:20px;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}

.mode-main img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* ================= MODE SELECTOR ================= */

.mode-selector{
  position:absolute;
  bottom:30px;
  right:30px;
  display:flex;
  gap:10px;
}

.mode-selector button{
  padding:8px 14px;
  border:none;
  border-radius:10px;
  background:#222;
  color:white;
  cursor:pointer;
  transition:0.3s;
}

.mode-selector button:hover{
  background:var(--accent);
  color:#000;
}

/* ================= ENTER BUTTON ================= */

.enter-btn{
  width:220px;
  height:55px;
  background:var(--accent);
  border:none;
  border-radius:40px;
  font-size:18px;
  cursor:pointer;
  transition:0.3s;
}

.enter-btn:hover{
  transform:scale(1.05);
}

</style>
</head>

<body>

<div class="wrapper">

  <div class="topbar">
    NEEK UNIVERSE
  </div>

  <div class="main-layout">

    <!-- LEFT SIDE -->
    <div class="side-images">
      <img id="left1" src="images/anime1.jpg">
      <img id="left2" src="images/anime2.jpg">
    </div>

    <!-- CENTER -->
    <div class="center-column">

      <div class="mode-main">
        <img id="mainImage" src="images/anime-main.jpg">
      </div>

      <button class="enter-btn">
        START GENERATE
      </button>

    </div>

    <!-- RIGHT SIDE -->
    <div class="side-images">
      <img id="right1" src="images/anime3.jpg">
      <img id="right2" src="images/anime4.jpg">
    </div>

  </div>

  <!-- MODE SELECTOR (BOTTOM RIGHT STYLE LIKE REF) -->
  <div class="mode-selector">
    <button onclick="setMode('anime')">Anime</button>
    <button onclick="setMode('movies')">Movies/Series</button>
    <button onclick="setMode('games')">Games</button>
    <button onclick="setMode('secret')">Secret</button>
  </div>

</div>

<script>

/* ================= MODE SWITCHER ================= */

function setMode(mode){

  const root = document.documentElement;

  const main = document.getElementById("mainImage");
  const l1 = document.getElementById("left1");
  const l2 = document.getElementById("left2");
  const r1 = document.getElementById("right1");
  const r2 = document.getElementById("right2");

  if(mode === "anime"){
    root.style.setProperty("--accent","#FF4444");
    root.style.setProperty("--topbar-bg","#FF4444");

    main.src="images/anime-main.jpg";
    l1.src="images/anime1.jpg";
    l2.src="images/anime2.jpg";
    r1.src="images/anime3.jpg";
    r2.src="images/anime4.jpg";
  }

  if(mode === "movies"){
    root.style.setProperty("--accent","#FF4444");
    root.style.setProperty("--topbar-bg","#FF4444");

    main.src="images/movie-main.jpg";
    l1.src="images/movie1.jpg";
    l2.src="images/movie2.jpg";
    r1.src="images/movie3.jpg";
    r2.src="images/movie4.jpg";
  }

  if(mode === "games"){
    root.style.setProperty("--accent","#00E5FF");
    root.style.setProperty("--topbar-bg","#00E5FF");

    main.src="images/game-main.jpg";
    l1.src="images/game1.jpg";
    l2.src="images/game2.jpg";
    r1.src="images/game3.jpg";
    r2.src="images/game4.jpg";
  }

  if(mode === "secret"){
    root.style.setProperty("--accent","#7A0000");
    root.style.setProperty("--topbar-bg","#7A0000");

    main.src="images/secret-main.jpg";
    l1.src="images/secret1.jpg";
    l2.src="images/secret2.jpg";
    r1.src="images/secret3.jpg";
    r2.src="images/secret4.jpg";
  }
}

</script>

</body>
</html>
