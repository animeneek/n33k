<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NEEK</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">

<style>
:root{
  --wrapper-bg:#000000;   /* ALWAYS BLACK */
  --topbar-bg:#FF4444;    /* MATCHES ACCENT */
  --accent:#FF4444;
}

*{margin:0;padding:0;box-sizing:border-box;transition:.3s ease;}

body{
  background:black;
  display:flex;
  justify-content:center;
  padding:40px;
  font-family:'Inter',sans-serif;
}

/* WRAPPER */
.wrapper{
  width:90vw;              /* Responsive width */
  max-width:1600px;        /* Wider premium look */
  background:var(--wrapper-bg);
  border-radius:40px;
  border:8px solid black;
  padding:60px 50px 50px;
  position:relative;
}

/* TOP CURVED BAR */
.topbar{
  position:absolute;
  top:-8px;
  left:50%;
  transform:translateX(-50%);
  width:75%;
  height:80px;
  background:var(--topbar-bg);
  border-radius:0 0 40px 40px;
  display:flex;
  align-items:center;
  justify-content:center;
  color:black;
  font-size:14px;
}
.topbar ul{display:flex;gap:40px;list-style:none;}

/* HEADER ROW */
.header{
  display:flex;
  justify-content:space-between;
  margin-bottom:40px;
}
.logo{
  font-family:'Oswald';
  font-size:26px;
  color:white;
}
.join{
  border:1px solid white;
  padding:8px 18px;
  border-radius:20px;
  background:white;
}

/* MAIN GRID */
.main-grid{
  display:grid;
  grid-template-columns:2fr 1fr;
  gap:40px;
}

/* TITLE */
.title{
  font-family:'Oswald';
  font-size:100px;
  line-height:.9;
  color:white;
}

/* FIXED IMAGE BOXES */
.hero-box{
  margin-top:30px;
  width:100%;
  height:420px;
  border-radius:30px;
  overflow:hidden;
}
.hero-box img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.side-box{
  width:100%;
  height:520px;
  border-radius:30px;
  overflow:hidden;
  position:relative;
}
.side-box img{
  width:100%;
  height:100%;
  object-fit:cover;
}
.accent-strip{
  position:absolute;
  right:0;
  top:0;
  width:14px;
  height:100%;
  background:var(--accent);
}

/* ENTER BUTTON */
.enter-wrap{
  display:flex;
  justify-content:center;
  margin:40px 0;
}
.enter-btn{
  width:160px;
  height:160px;
  border-radius:50%;
  border:4px solid white;
  background:black;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}
.enter-btn:hover{
  background:var(--accent);
  color:black;
}

/* BOTTOM PANEL */
.bottom-panel{
  margin-top:30px;
  background:white;
  border-radius:20px;
  padding:25px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.panel-left{
  max-width:60%;
}
.panel-title{
  font-weight:600;
  margin-bottom:8px;
}

.panel-options{
  display:flex;
  gap:12px;
  flex-wrap:wrap;
}
.panel-options button{
  padding:8px 14px;
  border:none;
  border-radius:20px;
  background:#eee;
  cursor:pointer;
}
.panel-options button.active{
  background:var(--accent);
  color:white;
}
</style>
</head>

<body>

<div class="wrapper">

<div class="topbar">
  <ul>
    <li>Lore</li>
    <li>Universes</li>
    <li>Archive</li>
    <li>Contact</li>
  </ul>
</div>

<div class="header">
  <div class="logo">NEEK°</div>
  <div class="join">Join</div>
</div>

<div class="main-grid">

  <div>
    <div class="title" id="titleText">ANIME<br>NEEK</div>

    <div class="hero-box">
      <img id="mainImage" src="images/anime-main.jpg">
    </div>
  </div>

  <div class="side-box">
    <div class="accent-strip"></div>
    <img id="sideImage" src="images/anime-side.jpg">
  </div>

</div>

<div class="enter-wrap">
  <div class="enter-btn">ENTER</div>
</div>

<div class="bottom-panel">
  <div class="panel-left">
    <div class="panel-title">NEEK UNIVERSE MODE</div>
    <div>Select your dimension.</div>
  </div>

  <div class="panel-options">
    <button class="active" onclick="mode('anime',this)">Anime</button>
    <button onclick="mode('movies',this)">Movies</button>
    <button onclick="mode('games',this)">Games</button>
    <button onclick="mode('secret',this)">Secret</button>
  </div>
</div>

</div>

<script>
function mode(type,el){

document.querySelectorAll('.panel-options button')
.forEach(b=>b.classList.remove('active'));
el.classList.add('active');

const root=document.documentElement;

if(type==='anime'){
root.style.setProperty('--accent','#FF4444');
root.style.setProperty('--topbar-bg','#FF4444');
titleText.innerHTML="ANIME<br>NEEK";
mainImage.src="images/anime-main.jpg";
sideImage.src="images/anime-side.jpg";
}

if(type==='movies'){
root.style.setProperty('--accent','#FF4444');
root.style.setProperty('--topbar-bg','#FF4444');
titleText.innerHTML="MOVIES<br>NEEK";
mainImage.src="images/movie-main.jpg";
sideImage.src="images/movie-side.jpg";
}

if(type==='games'){
root.style.setProperty('--accent','#00E5FF');
root.style.setProperty('--topbar-bg','#00E5FF');
titleText.innerHTML="GAMES<br>NEEK";
mainImage.src="images/game-main.jpg";
sideImage.src="images/game-side.jpg";
}

if(type==='secret'){
root.style.setProperty('--accent','#7A0000');
root.style.setProperty('--topbar-bg','#7A0000');
titleText.innerHTML="SECRET<br>NEEK";
mainImage.src="images/secret-main.jpg";
sideImage.src="images/secret-side.jpg";
}
}
</script>

</body>
</html>
