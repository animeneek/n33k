<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEEK</title>

<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">

<style>
:root {
  --accent: #FF4444;
  --bg1: #121212;
  --bg2: #1a1a1a;
}

* {
  margin:0;
  padding:0;
  box-sizing:border-box;
  transition: all .35s ease;
}

body {
  background: radial-gradient(circle at 30% 20%, var(--bg2), var(--bg1));
  font-family: 'Inter', sans-serif;
  color: white;
  display:flex;
  justify-content:center;
  padding:40px;
}

.container {
  width:1200px;
  background:#161616;
  border-radius:32px;
  padding:50px;
  position:relative;
  overflow:hidden;
}

/* NAV */

nav {
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:60px;
}

.logo {
  font-family:'Oswald';
  font-size:26px;
  letter-spacing:2px;
}

nav ul {
  display:flex;
  gap:40px;
  list-style:none;
  font-size:14px;
  opacity:.7;
}

nav ul li:hover {
  opacity:1;
  cursor:pointer;
}

/* HERO */

.hero {
  display:grid;
  grid-template-columns:2fr 1fr;
  gap:40px;
}

.hero h1 {
  font-family:'Oswald';
  font-size:95px;
  line-height:0.95;
  margin-bottom:30px;
}

.hero-image img {
  width:100%;
  border-radius:24px;
  opacity:.95;
}

.side-card {
  position:relative;
}

.side-card img {
  width:100%;
  border-radius:24px;
}

.accent-strip {
  position:absolute;
  right:0;
  top:0;
  width:6px;
  height:100%;
  background:var(--accent);
  border-radius:0 24px 24px 0;
}

/* BOTTOM RIGHT CONTROL PANEL */

.control-panel {
  position:absolute;
  bottom:40px;
  right:40px;
  width:300px;
  background:#111;
  border-radius:20px;
  padding:25px;
  box-shadow: 0 20px 60px rgba(0,0,0,.6);
  border:1px solid rgba(255,255,255,0.05);
}

.control-panel h4 {
  font-size:13px;
  letter-spacing:2px;
  opacity:.5;
  margin-bottom:15px;
}

.mode {
  font-size:22px;
  margin-bottom:15px;
  font-weight:500;
}

.options div {
  margin-bottom:8px;
  cursor:pointer;
  opacity:.6;
}

.options div.active {
  color:var(--accent);
  opacity:1;
}

.enter-btn {
  margin-top:15px;
  padding:10px 20px;
  border:1px solid var(--accent);
  background:transparent;
  border-radius:20px;
  cursor:pointer;
}

.enter-btn:hover {
  background:var(--accent);
  color:black;
}
</style>
</head>

<body>

<div class="container">

<nav>
  <div class="logo">NEEK°</div>
  <ul>
    <li>Lore</li>
    <li>Universes</li>
    <li>Archive</li>
  </ul>
  <div>Join</div>
</nav>

<div class="hero">

  <div>
    <h1>ENTER<br>NEEK</h1>
    <div class="hero-image">
      <img id="mainImage" src="images/anime-main.jpg">
    </div>
  </div>

  <div class="side-card">
    <div class="accent-strip"></div>
    <img id="sideImage" src="images/anime-side.jpg">
  </div>

</div>

<div class="control-panel">
  <h4>NEEK UNIVERSE</h4>
  <div class="mode" id="modeTitle">ANIME</div>

  <div class="options">
    <div class="active" onclick="changeMode('anime', this)">Anime</div>
    <div onclick="changeMode('movies', this)">Movies/Series</div>
    <div onclick="changeMode('games', this)">Games</div>
    <div onclick="changeMode('secret', this)">Secret</div>
  </div>

  <button class="enter-btn">ENTER</button>
</div>

</div>

<script>
function changeMode(type, el) {

  document.querySelectorAll('.options div')
    .forEach(o => o.classList.remove('active'));
  el.classList.add('active');

  const root = document.documentElement;

  if(type === 'anime') {
    root.style.setProperty('--accent', '#FF4444');
    document.getElementById('modeTitle').innerText = 'ANIME';
    mainImage.src = 'images/anime-main.jpg';
    sideImage.src = 'images/anime-side.jpg';
  }

  if(type === 'movies') {
    root.style.setProperty('--accent', '#FF4444');
    document.getElementById('modeTitle').innerText = 'MOVIES / SERIES';
    mainImage.src = 'images/movie-main.jpg';
    sideImage.src = 'images/movie-side.jpg';
  }

  if(type === 'games') {
    root.style.setProperty('--accent', '#00E5FF');
    document.getElementById('modeTitle').innerText = 'GAMES';
    mainImage.src = 'images/game-main.jpg';
    sideImage.src = 'images/game-side.jpg';
  }

  if(type === 'secret') {
    root.style.setProperty('--accent', '#7A0000');
    document.getElementById('modeTitle').innerText = 'SECRET';
    mainImage.src = 'images/secret-main.jpg';
    sideImage.src = 'images/secret-side.jpg';
  }
}
</script>

</body>
</html>
