<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Anime Player</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-900 text-white min-h-screen">

<div class="max-w-5xl mx-auto p-6">

<h1 class="text-3xl font-bold mb-6 text-center">
Anime Player
</h1>

<div class="flex gap-2 mb-4">
<input id="searchBox"
class="flex-1 p-2 rounded text-black"
placeholder="Search anime">

<button onclick="searchAnime()"
class="bg-blue-500 px-4 py-2 rounded">
Search
</button>
</div>

<div class="grid grid-cols-3 gap-3 mb-4">

<select id="animeSelect"
class="p-2 text-black rounded"></select>

<select id="episodeSelect"
class="p-2 text-black rounded"></select>

<select id="langSelect"
class="p-2 text-black rounded">
<option value="sub">Sub</option>
<option value="dub">Dub</option>
</select>

</div>

<button onclick="playAnime()"
class="w-full bg-green-500 py-2 rounded mb-4">
Play Episode
</button>

<div class="aspect-video bg-black rounded overflow-hidden">
<iframe id="player"
class="w-full h-full"
allowfullscreen></iframe>
</div>

<div id="embedURL"
class="mt-4 text-green-400 break-all"></div>

</div>

<script>

let animeCache=[]

async function searchAnime(){

const query=document.getElementById("searchBox").value

const res=await fetch(
`https://api.jikan.moe/v4/anime?q=${query}&limit=10`
)

const data=await res.json()

animeCache=data.data

const select=document.getElementById("animeSelect")

select.innerHTML=""

animeCache.forEach(a=>{

const opt=document.createElement("option")

opt.value=a.mal_id
opt.text=a.title

select.appendChild(opt)

})

loadEpisodes()

}

async function loadEpisodes(){

const id=document.getElementById("animeSelect").value

const res=await fetch(
`https://api.jikan.moe/v4/anime/${id}`
)

const data=await res.json()

const episodes=data.data.episodes || 12

const epSelect=document.getElementById("episodeSelect")

epSelect.innerHTML=""

for(let i=1;i<=episodes;i++){

const opt=document.createElement("option")

opt.value=i
opt.text="Episode "+i

epSelect.appendChild(opt)

}

}

function playAnime(){

const mal=document.getElementById("animeSelect").value
const ep=document.getElementById("episodeSelect").value
const lang=document.getElementById("langSelect").value

// Example embed provider
const embed=`https://vidsrc.xyz/embed/anime/${mal}/${ep}`

document.getElementById("player").src=embed

document.getElementById("embedURL").innerHTML=
`Embed URL: <a href="${embed}" target="_blank" class="underline">${embed}</a>`

}

document.getElementById("animeSelect")
.addEventListener("change",loadEpisodes)

</script>

</body>
</html>
